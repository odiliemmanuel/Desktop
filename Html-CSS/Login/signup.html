<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="wrapperBox">
        <div class="login">
            <h1>Sign Up</h1>
            <input class="input" type="firstname" placeholder="Enter firstname...">
            <input class="input" type="middlename" placeholder="Enter middlename..">
            <input class="input" type="lastname" placeholder="Enter lastname...">
            <input class="input" type="email" placeholder="Enter email...">
            <input class="input" type="password" placeholder="Enter password...">
            <input class="input" type="password" placeholder="Confirm password...">


            <div class="button">
                
                <button>Submit</button>
            </div>
            
        </div>
    </div>
    
</body>
</html>
